<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GO, AI Lotto Lab Warp Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Michroma&display=swap" rel="stylesheet">

    <style>
        :root {
            --sw-yellow: #FFE81F;
            --sw-blue: #69C8F2;
            --sw-red: #BC1E22;
            --bg-black: #000000;
            --glass-bg: rgba(20, 20, 25, 0.7);
        }

        body {
            margin: 0;
            font-family: 'Michroma', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            background-color: var(--bg-black);
        }

        #space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            color: var(--sw-yellow);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 232, 31, 0.6), 2px 2px 0px #000;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; letter-spacing: 2px; }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 24px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        }

        .scan-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        @media (max-width: 600px) {
            .scan-controls { grid-template-columns: 1fr; gap: 10px; }
        }

        button {
            font-family: 'Orbitron', sans-serif;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            background: rgba(40, 40, 50, 0.6);
            color: white;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--sw-yellow);
            color: #000;
            border-color: var(--sw-yellow);
            box-shadow: 0 0 15px rgba(255, 232, 31, 0.5);
        }

        button.secondary { background: rgba(52, 199, 89, 0.2); border-color: #34c759; color: #34c759; }
        button.secondary:hover { background: #34c759; color: #000; }
        
        button.danger { background: rgba(255, 59, 48, 0.2); border-color: #ff3b30; color: #ff3b30; }
        button.danger:hover { background: #ff3b30; color: #fff; }

        .ballBox { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .ball {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.1rem;
            color: #000; box-shadow: inset 0 -4px 6px rgba(0,0,0,0.3), 0 4px 10px rgba(0,0,0,0.5);
        }

        .b1 { background: #fbc400; } .b10 { background: #69c8f2; }
        .b20 { background: #ff7272; } .b30 { background: #aaa; } .b40 { background: #b0d840; }

        .loading {
            color: var(--sw-blue); font-family: 'Orbitron', sans-serif; font-weight: bold;
            font-size: 1.2rem; text-align: center; padding: 20px; text-shadow: 0 0 10px var(--sw-blue);
        }

        .combo-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

<canvas id="space"></canvas>

<div class="container">
    <h1>GO, AI Lotto Lab Warp Pro</h1>

    <div class="card scan-controls">
        <button onclick="analyze(10)">🛸 궤도 스캔 (Orbit)</button>
        <button onclick="analyze(30)">🌌 항성계 스캔 (Stellar)</button>
        <button onclick="analyze(100)">🛰️ 심우주 퀀텀 다이브</button>
    </div>

    <div id="status"></div>

    <div class="card" id="ai-section" style="display:none;">
        <h2 style="color: var(--sw-yellow); margin-top:0;">🤖 AI 양자 엔진 추천</h2>
        <p style="font-size:0.8rem; color:#ccc;">분석된 하이퍼스페이스 좌표계 데이터를 기반으로 최적의 워프 경로(번호)를 도출합니다.</p>
        <button class="secondary" onclick="generateAI()">🎯 AI 경로 5개 생성</button>
        <button onclick="toggleSaved()">💾 내 좌표 보관함</button>
        
        <div id="ai-results" style="margin-top: 15px;"></div>
        <div id="saved-results" style="margin-top: 25px; display:none;">
            <h3 style="color: var(--sw-blue); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">📥 저장된 좌표 리스트</h3>
            <div id="saved-list"></div>
        </div>
    </div>

    <div id="analysis"></div>
</div>

<script>
/* 🚀 배경 애니메이션 */
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;
let stars = [];
for(let i = 0; i < 800; i++) {
    stars.push({x: Math.random() * width - width / 2, y: Math.random() * height - height / 2, z: Math.random() * width, pz: Math.random() * width});
}
let speed = 0.5; let targetSpeed = 0.5;

function drawStars() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.fillRect(0, 0, width, height);
    ctx.translate(width / 2, height / 2);
    speed += (targetSpeed - speed) * 0.05;
    for(let i = 0; i < stars.length; i++) {
        let s = stars[i]; s.z -= speed;
        if(s.z < 1) { s.z = width; s.pz = s.z; s.x = Math.random() * width - width / 2; s.y = Math.random() * height - height / 2; }
        let sx = (s.x / s.z) * width; let sy = (s.y / s.z) * height;
        let px = (s.x / s.pz) * width; let py = (s.y / s.pz) * height;
        s.pz = s.z;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(255, 255, 255, ${1 - s.z/width})`; 
        ctx.lineWidth = Math.max(0.1, (1 - s.z / width) * 2.5); 
        ctx.moveTo(px, py); ctx.lineTo(sx, sy); ctx.stroke();
    }
    ctx.translate(-width / 2, -height / 2);
    requestAnimationFrame(drawStars);
}
drawStars();

/* 로직 */
let globalHot = [], globalCold = [], savedCombos = JSON.parse(localStorage.getItem('lottoCombos')) || [];

async function get(round){
    const url = `https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=${round}`;
    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));
    return await res.json();
}

function getLatestRound() {
    const firstDrawDate = new Date('2002-12-07T20:45:00+09:00');
    const today = new Date();
    return 1 + Math.floor((today - firstDrawDate) / (1000 * 60 * 60 * 24 * 7));
}

function getBallColor(n) {
    if(n <= 10) return 'b1'; if(n <= 20) return 'b10';
    if(n <= 30) return 'b20'; if(n <= 40) return 'b30'; return 'b40';
}

function drawBalls(nums){
    let html='<div class="ballBox">';
    nums.forEach(n => { html+=`<div class="ball ${getBallColor(n)}">${n}</div>`; });
    return html + '</div>';
}

async function analyze(range){
    targetSpeed = 15;
    document.getElementById("status").innerHTML = "<div class='loading'>🛸 스캔 중...</div>";
    document.getElementById("ai-section").style.display = "none";
    document.getElementById("analysis").innerHTML = "";
    
    const latestRound = getLatestRound();
    const counter = {}; for(let i=1; i<=45; i++) counter[i] = 0;
    const fetchPromises = [];
    for(let r = latestRound; r > latestRound - range; r--) fetchPromises.push(get(r).catch(() => null)); 

    const dataResults = await Promise.all(fetchPromises);
    dataResults.forEach(d => {
        if(d && d.returnValue === "success") {
            [d.drwtNo1, d.drwtNo2, d.drwtNo3, d.drwtNo4, d.drwtNo5, d.drwtNo6].forEach(n => counter[n]++);
        }
    });

    const sorted = Object.entries(counter).sort((a,b)=>b[1]-a[1]);
    globalHot = sorted.slice(0, 7).map(v=>+v[0]);
    globalCold = sorted.slice(-7).map(v=>+v[0]);

    document.getElementById("analysis").innerHTML = `
    <div class="card">
        <h2 style="color: var(--sw-yellow); margin-top:0;">📊 섹터 탐사 보고서</h2>
        <h3 style="color:#ff7272">🔥 고빈도 (HOT)</h3>
        ${drawBalls(globalHot.slice(0,6))}
        <h3 style="color:var(--sw-blue)">🧊 저빈도 (COLD)</h3>
        ${drawBalls(globalCold.slice(0,6))}
    </div>`;

    document.getElementById("status").innerHTML = "";
    document.getElementById("ai-section").style.display = "block";
    targetSpeed = 0.5;
}

function generateAI() {
    targetSpeed = 10;
    const box = document.getElementById("ai-results");
    box.innerHTML = "<div class='loading'>🤖 연산 중...</div>";
    setTimeout(() => {
        let html = "";
        for(let i=0; i<5; i++) {
            let combo = new Set();
            while(combo.size < 2) combo.add(globalHot[Math.floor(Math.random() * globalHot.length)]);
            while(combo.size < 4) combo.add(globalCold[Math.floor(Math.random() * globalCold.length)]);
            while(combo.size < 6) combo.add(Math.floor(Math.random() * 45) + 1);
            let sorted = Array.from(combo).sort((a,b)=>a-b);
            html += `<div class="combo-row">${drawBalls(sorted)}<button class="secondary" onclick='saveCombo(${JSON.stringify(sorted)})'>저장</button></div>`;
        }
        box.innerHTML = html;
        targetSpeed = 0.5;
    }, 400);
}

function saveCombo(c) {
    savedCombos.push(c); localStorage.setItem('lottoCombos', JSON.stringify(savedCombos));
    alert("✅ 저장 완료");
    if(document.getElementById("saved-results").style.display === "block") renderSaved();
}

function toggleSaved() {
    const b = document.getElementById("saved-results");
    b.style.display = (b.style.display === "none") ? "block" : "none";
    if(b.style.display === "block") renderSaved();
}

function renderSaved() {
    const l = document.getElementById("saved-list");
    savedCombos = JSON.parse(localStorage.getItem('lottoCombos')) || [];
    l.innerHTML = savedCombos.length === 0 ? "<p style='text-align:center;'>기록 없음</p>" : 
        savedCombos.map((c, i) => `<div class="combo-row">${drawBalls(c)}<button class="danger" onclick="deleteCombo(${i})">삭제</button></div>`).join('');
}

function deleteCombo(i) {
    savedCombos.splice(i, 1);
    localStorage.setItem('lottoCombos', JSON.stringify(savedCombos));
    renderSaved();
}

window.onload = () => analyze(10);
</script>
</body>
</html>
